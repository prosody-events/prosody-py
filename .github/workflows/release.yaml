name: Release

on:
  push:

permissions:
  contents: write
  pull-requests: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_PROFILE_TEST_DEBUG: 0

jobs:
#  release-please:
#    runs-on: ubuntu-latest
#    outputs:
#      release_created: ${{ steps.release.outputs.release_created }}
#      tag_name: ${{ steps.release.outputs.tag_name }}
#    steps:
#      - uses: google-github-actions/release-please-action@v3
#        id: release
#        with:
#          release-type: rust
#          package-name: prosody
#          token: ${{ secrets.TEMP_GH_ALL_REPOS_RW }}

  linux:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: ubuntu-latest
            target: x86_64
          - runner: ubuntu-latest
            target: aarch64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
      - uses: de-vri-es/setup-git-credentials@v2
        with:
          credentials: https://Joshua-Griffith_fnf:${{ secrets.TEMP_GH_ALL_REPOS_RW }}@github.com/
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: 'true'
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --find-interpreter
          sccache: 'true'
          manylinux: ${{ matrix.platform.target == 'aarch64' && '2_24' || 'auto' }}
          before-script-linux: |
            if command -v apk > /dev/null; then
              apk add --no-cache cmake make curl-dev
            elif command -v yum > /dev/null; then
              yum install -y cmake libcurl-devel
            elif command -v apt-get > /dev/null; then
              apt-get update
              apt-get install -y cmake libcurl4-openssl-dev
              # manylinux_2_24-cross:aarch64 is an arm64-native Ubuntu image; headers
              # land at /usr/include/aarch64-linux-gnu/curl/. Symlink them into the
              # cross-compiler sysroot where GCC searches: the deep nested sysroot path.
              ln -sf /usr/include/aarch64-linux-gnu/curl \
                /usr/aarch64-unknown-linux-gnu/aarch64-unknown-linux-gnu/sysroot/usr/include/curl
            fi
          docker-options: >-
            -v /home/runner/.config/git/credentials:/root/.config/git/credentials:ro
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.platform.target }}
          path: dist

  musllinux:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: ubuntu-latest
            target: x86_64
          - runner: ubuntu-latest
            target: aarch64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
      - uses: de-vri-es/setup-git-credentials@v2
        with:
          credentials: https://Joshua-Griffith_fnf:${{ secrets.TEMP_GH_ALL_REPOS_RW }}@github.com/
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: 'true'
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --find-interpreter
          sccache: 'true'
          manylinux: musllinux_1_2
          before-script-linux: |
            if command -v apk > /dev/null; then
              apk add --no-cache cmake make curl-dev
            elif command -v yum > /dev/null; then
              yum install -y cmake libcurl-devel
            elif command -v apt-get > /dev/null; then
              apt-get update && apt-get install -y cmake libcurl4-openssl-dev
              # rust-musl-cross is arm64-native Ubuntu; headers land at
              # /usr/include/aarch64-linux-gnu/curl/. Symlink into each musl
              # cross-compiler's include dir (already exists in the image).
              for target_dir in /usr/local/musl/*/; do
                ln -sf /usr/include/aarch64-linux-gnu/curl "${target_dir}include/curl"
              done
            fi
          docker-options: >-
            -v /home/runner/.config/git/credentials:/root/.config/git/credentials:ro
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-musllinux-${{ matrix.platform.target }}
          path: dist

  windows:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: windows-latest
            target: x64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
          architecture: ${{ matrix.platform.target }}
      - uses: de-vri-es/setup-git-credentials@v2
        with:
          credentials: https://Joshua-Griffith_fnf:${{ secrets.TEMP_GH_ALL_REPOS_RW }}@github.com/
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: 'true'
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --find-interpreter
          sccache: 'true'
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-${{ matrix.platform.target }}
          path: dist

  macos:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: macos-14
            target: aarch64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
      - uses: dtolnay/rust-toolchain@stable
      - uses: de-vri-es/setup-git-credentials@v2
        with:
          credentials: https://Joshua-Griffith_fnf:${{ secrets.TEMP_GH_ALL_REPOS_RW }}@github.com/
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: 'true'
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --find-interpreter
          sccache: 'true'
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.platform.target }}
          path: dist

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: de-vri-es/setup-git-credentials@v2
        with:
          credentials: https://Joshua-Griffith_fnf:${{ secrets.TEMP_GH_ALL_REPOS_RW }}@github.com/
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: 'true'
        with:
          command: sdist
          args: --out dist
      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

