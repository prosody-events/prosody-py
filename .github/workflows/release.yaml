name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_as:
        description: 'Force release version (e.g. 2.2.0-alpha.1)'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_PROFILE_TEST_DEBUG: 0

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: google-github-actions/release-please-action@v3
        id: release
        with:
          release-type: rust
          package-name: prosody
          token: ${{ secrets.TEMP_GH_ALL_REPOS_RW }}
          release-as: ${{ inputs.release_as }}

  linux:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: ubuntu-latest
            target: x86_64
          - runner: ubuntu-latest
            target: aarch64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
      - uses: de-vri-es/setup-git-credentials@v2
        with:
          credentials: https://Joshua-Griffith_fnf:${{ secrets.TEMP_GH_ALL_REPOS_RW }}@github.com/
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: 'true'
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --find-interpreter
          sccache: 'true'
          manylinux: ${{ matrix.platform.target == 'aarch64' && '2_24' || 'auto' }}
          before-script-linux: |
            if command -v apk > /dev/null; then
              apk add --no-cache cmake make curl-dev
            elif command -v yum > /dev/null; then
              yum install -y cmake libcurl-devel
            elif command -v apt-get > /dev/null; then
              apt-get update
              apt-get install -y cmake libcurl4-openssl-dev
              # Headers land under a multiarch dir (e.g. x86_64-linux-gnu or
              # aarch64-linux-gnu depending on the runner). Symlink into the
              # cross-compiler's sysroot where GCC actually searches.
              curl_include=$(dirname "$(find /usr/include -name 'curl.h' | head -1)")
              ln -sf "$curl_include" \
                /usr/aarch64-unknown-linux-gnu/aarch64-unknown-linux-gnu/sysroot/usr/include/curl
            fi
          docker-options: >-
            -v /home/runner/.config/git/credentials:/root/.config/git/credentials:ro
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.platform.target }}
          path: dist

  musllinux:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: ubuntu-latest
            target: x86_64
          - runner: ubuntu-latest
            target: aarch64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
      - uses: de-vri-es/setup-git-credentials@v2
        with:
          credentials: https://Joshua-Griffith_fnf:${{ secrets.TEMP_GH_ALL_REPOS_RW }}@github.com/
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: 'true'
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --find-interpreter
          sccache: 'true'
          manylinux: musllinux_1_2
          before-script-linux: |
            if command -v apk > /dev/null; then
              apk add --no-cache cmake make curl-dev
            elif command -v yum > /dev/null; then
              yum install -y cmake libcurl-devel
            elif command -v apt-get > /dev/null; then
              apt-get update && apt-get install -y cmake libcurl4-openssl-dev
              # Headers land under a multiarch dir (arch-dependent). Symlink into
              # each musl cross-compiler's include dir (already exists in the image).
              curl_include=$(dirname "$(find /usr/include -name 'curl.h' | head -1)")
              for target_dir in /usr/local/musl/*-unknown-linux-musl/; do
                ln -sf "$curl_include" "${target_dir}include/curl"
              done
            fi
          docker-options: >-
            -v /home/runner/.config/git/credentials:/root/.config/git/credentials:ro
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-musllinux-${{ matrix.platform.target }}
          path: dist

  windows:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: windows-latest
            target: x64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
          architecture: ${{ matrix.platform.target }}
      - uses: de-vri-es/setup-git-credentials@v2
        with:
          credentials: https://Joshua-Griffith_fnf:${{ secrets.TEMP_GH_ALL_REPOS_RW }}@github.com/
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: 'true'
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --find-interpreter
          sccache: 'true'
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-${{ matrix.platform.target }}
          path: dist

  macos:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: macos-14
            target: aarch64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
      - uses: dtolnay/rust-toolchain@stable
      - uses: de-vri-es/setup-git-credentials@v2
        with:
          credentials: https://Joshua-Griffith_fnf:${{ secrets.TEMP_GH_ALL_REPOS_RW }}@github.com/
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: 'true'
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --find-interpreter
          sccache: 'true'
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.platform.target }}
          path: dist

  sdist:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: de-vri-es/setup-git-credentials@v2
        with:
          credentials: https://Joshua-Griffith_fnf:${{ secrets.TEMP_GH_ALL_REPOS_RW }}@github.com/
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: 'true'
        with:
          command: sdist
          args: --out dist
      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [ release-please, linux, musllinux, windows, macos, sdist ]
    if: ${{ needs.release-please.outputs.release_created }}
    steps:
      - uses: actions/download-artifact@v4
      - name: Publish to Gemfury
        uses: PyO3/maturin-action@v1
        env:
          MATURIN_REPOSITORY_URL: https://push.fury.io/realgeeks/
          MATURIN_USERNAME: ${{ secrets.GEMFURY_PUSH_TOKEN }}
          MATURIN_PASSWORD:
        with:
          command: upload
          args: --non-interactive --skip-existing wheels-*/*
