[pytest]
addopts = -s -m "not tracing and not integration" --ignore=tests/test_tracing_integration.py
log_cli = True
log_cli_level = INFO
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
filterwarnings =
    ignore::DeprecationWarning
    ignore:.*PyType_Spec.*metaclass.*:DeprecationWarning
markers =
    tracing: marks tests as tracing integration tests (deselected by default)
    integration: marks tests as integration tests (deselected by default)
    slow: marks tests as slow (run with @pytest.mark.slow)
